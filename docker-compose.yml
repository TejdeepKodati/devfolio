version: "3.9"

services:
  app:
    build: .
    ports:
      - "8070:8070"
    environment:
      ENV: development
      PORT: 8070
      DATABASE_URL: postgres://postgres:postgres@db:5432/devfolio?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: devfolio-change-in-production-min-32-chars
      ADMIN_EMAIL: admin@tejdeep.dev
      ADMIN_PASS: changeme123
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devfolio
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5434:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6381:6379"

volumes:
  pgdata:
  redisdata:
